          maxItems: 1000
          minItems: 1
          nullable: true
          type: array
          default: null
        style: form
      - description: Filter items bought after this game time (seconds).
        explode: true
        in: query
        name: min_bought_at_s
        required: false
        schema:
          format: int32
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter items bought before this game time (seconds).
        explode: true
        in: query
        name: max_bought_at_s
        required: false
        schema:
          format: int32
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: |-
          Filter by purchase order. Each value is a comma-separated, ordered list of item
          ids (e.g. `1396247347,3977876567`). This is a *constraint*, not an inclusion
          filter: for each adjacent pair in the list, a match is excluded only when the
          player bought **both** items but bought the later one first. Builds missing
          either item are unaffected. Repeat the parameter for multiple independent
          orderings. See more: <https://api.deadlock-api.com/v1/assets/items>

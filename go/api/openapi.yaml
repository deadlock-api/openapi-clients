  /v1/matches/demo/live/query:
    get:
      description: |2

        Run a SQL query over a match's **live** broadcast and stream result rows over Server-Sent Events as
        the match plays, instead of waiting for the demo to finish (see the async `/demo/query`).

        Provide either `match_id` (the server spectates the lobby to obtain the broadcast URL) or an explicit
        `broadcast_url` from `/live/urls`.

        Projection/filter queries emit rows continuously as they are decoded. A whole-match aggregation
        (`GROUP BY` / `ORDER BY`) can only produce its final rows once the broadcast ends.

        ### Rate Limits:
        | Type | Limit |
        | ---- | ----- |
        | IP | 20req/m |
        | Global | 100req/m |
      operationId: live_query
      parameters:
      - description: SQL query to run over the broadcast's entity/event tables (see
          `/demo/schema`).
        explode: true
        in: query
        name: query
        required: true
        schema:
          type: string
        style: form
      - description: |-
          Match to spectate and stream. Provide this or `broadcast_url`; `broadcast_url` wins if both
          are given. Resolving a match spectates its lobby and is rate-limited.
        explode: true
        in: query
        name: match_id
        required: false
        schema:
          format: int64
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Explicit broadcast base URL (from `/live/urls`). Provide this
          or `match_id`.
        explode: true
        in: query
        name: broadcast_url
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            text/event-stream: {}
          description: "SSE stream of result rows. Each `message` event's `data` is\
            \ one result row as a JSON object; a terminal `end` event marks the end\
            \ of the broadcast, and an `error` event carries any mid-stream failure."
        "400":
          description: "Neither match_id nor broadcast_url given, or the query is\
            \ invalid."
        "429":
          description: Rate limit exceeded
        "500":
          description: Failed to start the live query
        "502":
          description: The live broadcast could not be fetched
      summary: Live Demo Query (SSE)
      tags:
      - Demo
  /v1/matches/demo/query:
    post:
      description: |2

        Submit a SQL query against a match's demo file. The work (download + decompress + parse +
        query) takes ~55s, so this is asynchronous: the endpoint returns a `job_id` you poll via
        `/demo/query/{job_id}`. Once done, the status response carries a public URL to the result
        artifact (Parquet or NDJSON).

        Identical `(match_id, query, format)` submissions are deduplicated and reuse a cached result.

        ### Rate Limits:
        | Type | Limit |
        | ---- | ----- |
        | IP | 20req/h |
        | Key | 200req/h |
        | Global | 400req/h |
      operationId: submit
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoQueryRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoQueryJobResponse"
          description: Job already exists (deduplicated)
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoQueryJobResponse"
          description: Job queued
        "400":
          description: Provided parameters are invalid.
        "404":
          description: No demo / salts available for the match
        "429":
          description: Rate limit exceeded or queue full
        "500":
          description: Failed to queue the job
      summary: Demo Query
      tags:
      - Demo
  /v1/matches/demo/query/{job_id}:
    get:
      description: |2

        Returns the status of a demo query job. While `queued`/`running` it includes a rough
        `estimated_wait_seconds`; when `done` it includes `result_url` (a public link to the
        Parquet/NDJSON artifact); when `failed` it includes `error`.
      operationId: status
      parameters:
      - description: Job id returned by POST /demo/query
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoQueryStatusResponse"
          description: ""
        "404":
          description: Job not found or expired
      summary: Demo Query Status
      tags:
      - Demo
  /v1/matches/demo/schema:
    get:
      description: "\nReturns the queryable schema of a match's demo file: every entity\
        \ and event table with its\ncolumns and Arrow types.\n\nBy default this returns\
        \ the schema of the most recent match we have a demo for. Optionally\npass\
        \ `match_id` to read the schema for a specific match; if we don't already\
        \ have its salts,\nthey are fetched from Steam (rate limited, see `/{match_id}/salts`).\n\
        \    "
      operationId: schema
      parameters:
      - description: |-
          Match to read the schema for. If omitted, the schema of the most recent match we
          have a demo for is returned. When set, the demo's salts are fetched (rate limited)
          if they are not already stored.
        explode: true
        in: query
        name: match_id
        required: false
        schema:
          format: int64
          minimum: 0
          nullable: true
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoSchemaResponse"
          description: ""
        "400":
          description: Provided parameters are invalid.
        "404":
          description: No demo / salts available for the match
        "429":
          description: Rate limit exceeded
        "500":
          description: Reading the demo schema failed
      summary: Demo Schema
      tags:
      - Demo
  /v1/matches/live/urls:
    get:
      description: "\nReturns a list of all currently available live broadcast URLs.\n\
        \nThese can be used in any demofile broadcast parser:\n- [Demofile-Net](https://github.com/saul/demofile-net)\n\
        - [Haste](https://github.com/blukai/haste/)\n\n### Rate Limits:\n| Type |\
        \ Limit |\n| ---- | ----- |\n| IP | 100req/s |\n| Key | - |\n| Global | -\
        \ |\n    "
      operationId: urls
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/LiveUrl"
                type: array
                default: null
          description: ""
        "500":
          description: Fetching live URLs failed
      summary: Live Broadcast URLs
      tags:
      - Matches
    post:
      description: "\nSubmit one or more live broadcast URLs so they show up in the\
        \ `GET /live/urls` listing.\n\nEach submitted URL is stored for 15 minutes;\
        \ re-submit periodically to keep a match listed\nwhile it is still live. Existing\
        \ entries for the same `match_id` are overwritten.\n\nThese URLs can be used\
        \ in any demofile broadcast parser:\n- [Demofile-Net](https://github.com/saul/demofile-net)\n\
        - [Haste](https://github.com/blukai/haste/)\n\n### Rate Limits:\n| Type |\
        \ Limit |\n| ---- | ----- |\n| IP | 100req/s |\n| Key | - |\n| Global | -\
        \ |\n    "
      operationId: ingest_urls
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: "#/components/schemas/IngestLiveUrl"
              type: array
              default: null
        required: true
      responses:
        "200":
          description: ""
        "400":
          description: Provided parameters are invalid.
        "429":
          description: Rate limit exceeded
        "500":
          description: Ingesting live URLs failed
      summary: Ingest Live Broadcast URLs
      tags:
      - Matches
  /v1/matches/metadata:
    get:
      description: "\nThis endpoints lets you fetch multiple match metadata at once.\
        \ The response is a JSON array of match metadata.\n\nWhen player info is included,\
        \ each player object contains a `hero_build_id` field (if available) from\
        \ demo analysis.\n\n> **Note:** The `hero_build_id` represents the first build\
        \ the player had selected when the game started. It does not reflect any build\
        \ changes made during the match.\n\n### Rate Limits:\n| Type | Limit |\n|\
        \ ---- | ----- |\n| IP | 10req/min |\n| Key | 10req/10s |\n| Global | 100req/min\
        \ |\n    "
      operationId: bulk_metadata
      parameters:
      - description: Include match info in the response.
        explode: true
        in: query
        name: include_info
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - description: Include more match info in the response.
        explode: true
        in: query
        name: include_more_info
        required: false
        schema:
          type: boolean
        style: form
      - description: Include objectives in the response.
        explode: true
        in: query
        name: include_objectives
        required: false
        schema:
          type: boolean
        style: form
      - description: Include midboss in the response.
        explode: true
        in: query
        name: include_mid_boss
        required: false
        schema:
          type: boolean
        style: form
      - description: Include player info in the response.
        explode: true
        in: query
        name: include_player_info
        required: false
        schema:
          type: boolean
        style: form
      - description: "Include only K/D/A fields (`kills`, `deaths`, `assists`) for\
          \ players."
        explode: true
        in: query
        name: include_player_kda
        required: false
        schema:
          type: boolean
        style: form
      - description: Include player items in the response.
        explode: true
        in: query
        name: include_player_items
        required: false
        schema:
          type: boolean
        style: form
      - description: Include player stats in the response.
        explode: true
        in: query
        name: include_player_stats
        required: false
        schema:
          type: boolean
        style: form
      - description: |-
          Include only the final per-player stats (last sample of every `stats.*`
          time-series) as a single `final_stats` object. Far cheaper than
          `include_player_stats`, which returns the whole array per field.
        explode: true
        in: query
        name: include_player_final_stats
        required: false
        schema:
          type: boolean
        style: form
      - description: Include player death details in the response.
        explode: true
        in: query
        name: include_player_death_details
        required: false
        schema:
          type: boolean
        style: form
      - description: "Filter matches based on their game mode. Valid values: `normal`,\
          \ `street_brawl`. Omit or pass empty string for no filter."
        explode: true
        in: query
        name: game_mode
        required: false
        schema:
          enum:
          - normal
          - street_brawl
          - explore_n_y_c
          - internal
          nullable: true
          type: string
        style: form
      - description: "Filter matches based on the match mode. Valid values: `unranked`,\
          \ `private_lobby`, `coop_bot`, `ranked`, `server_test`, `tutorial`, `hero_labs`.\
          \ **Default:** `ranked,unranked`."
        explode: true
        in: query
        name: match_mode
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: "Comma separated list of match ids, limited by `limit`"
        explode: true
        in: query
        name: match_ids
        required: false
        schema:
          items:
            format: int64
            minimum: 0
            type: integer
          maxItems: 1000
          minItems: 1
          nullable: true
          type: array
          default: null
        style: form
      - description: Filter matches based on their start time (Unix timestamp).
        explode: true
        in: query
        name: min_unix_timestamp
        required: false
        schema:
          format: int64
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their start time (Unix timestamp).
        explode: true
        in: query
        name: max_unix_timestamp
        required: false
        schema:
          format: int64
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their duration in seconds (up to 7000s).
        explode: true
        in: query
        name: min_duration_s
        required: false
        schema:
          format: int64
          maximum: 7000
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their duration in seconds (up to 7000s).
        explode: true
        in: query
        name: max_duration_s
        required: false
        schema:
          format: int64
          maximum: 7000
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: "Filter matches based on the average badge level (tier = first\
          \ digits, subtier = last digit) of *both* teams involved. See more: <https://api.deadlock-api.com/v1/assets/ranks>"
        explode: true
        in: query
        name: min_average_badge
        required: false
        schema:
          format: int32
          maximum: 116
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: "Filter matches based on the average badge level (tier = first\
          \ digits, subtier = last digit) of *both* teams involved. See more: <https://api.deadlock-api.com/v1/assets/ranks>"
        explode: true
        in: query
        name: max_average_badge
        required: false
        schema:
          format: int32
          maximum: 116
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their ID.
        explode: true
        in: query
        name: min_match_id
        required: false
        schema:
          format: int64
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their ID.
        explode: true
        in: query
        name: max_match_id
        required: false
        schema:
          format: int64
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on whether they are in the high skill range.
        explode: true
        in: query
        name: is_high_skill_range_parties
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - description: Filter matches based on whether they are in the low priority
          pool.
        explode: true
        in: query
        name: is_low_pri_pool
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - description: Filter matches based on whether they are in the new player pool.
        explode: true
        in: query
        name: is_new_player_pool
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - description: Filter matches by account IDs of players that participated in
          the match.
        explode: true
        in: query
        name: account_ids
        required: false
        schema:
          items:
            format: int32
            minimum: 0
            type: integer
          nullable: true
          type: array
          default: null
        style: form
      - description: "Filter matches based on the hero IDs. See more: <https://api.deadlock-api.com/v1/assets/heroes>"
        explode: true
        in: query
        name: hero_ids
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Hero ID to scope item filters to. Required when using `include_item_ids`
          or `exclude_item_ids`.
        explode: true
        in: query
        name: item_filter_hero_id
        required: false
        schema:
          format: int32
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: |-
          Comma separated list of item ids to include.
          Requires `item_filter_hero_id`. Returns matches where a player on the specified hero has ALL of these items.
        explode: true
        in: query
        name: include_item_ids
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: |-
          Comma separated list of item ids to exclude.
          Requires `item_filter_hero_id`. Returns matches where a player on the specified hero has NONE of these items.
        explode: true
        in: query
        name: exclude_item_ids
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: |-
          Comma separated list of extra match-level columns to include in the response.
          Each column is aggregated with `any(...)`. Only alphanumeric characters, underscores, and
          dots (for nested field access) are allowed.
          Example: `objectives_mask_team0,team_score`.
        explode: true
        in: query
        name: extra_match_columns
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: |-
          Comma separated list of extra player-level columns to include in the response.
          Each column is added inside the player tuple. Only alphanumeric characters, underscores,
          and dots (for nested field access) are allowed.
          Example: `stats.player_damage,stats.player_healing`. Implicitly enables player fields.
        explode: true
        in: query
        name: extra_player_columns
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: The field to order the results by.
        explode: true
        in: query
        name: order_by
        required: false
        schema:
          enum:
          - match_id
          - start_time
          - average_badge
          type: string
        style: form
      - description: The direction to order the results by.
        explode: true
        in: query
        name: order_direction
        required: false
        schema:
          enum:
          - desc
          - asc
          type: string
        style: form
      - description: The maximum number of matches to return.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 1000
          format: int32
          maximum: 10000
          minimum: 1
          type: integer
        style: form
      - description: "The response format. Valid values: `json` (a JSON array), `ndjson`\
          \ (newline-delimited JSON objects)."
        explode: true
        in: query
        name: format
        required: false
        schema:
          enum:
          - json
          - ndjson
          type: string
        style: form
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                items:
                  format: int32
                  minimum: 0
                  type: integer
                type: array
                default: null
          description: ""
        "400":
          description: Provided parameters are invalid.
        "429":
          description: Rate limit exceeded
      summary: Bulk Metadata
      tags:
      - Matches
  /v1/matches/recently-fetched:

  /v1/players/steam:
    get:
      description: "\nThis endpoint returns Steam profiles of players.\n\nPass `refresh=true`\
        \ to force a live refresh of the listed accounts from the\nSteam Web API (`GetPlayerSummaries`\
        \ + `GetFriendList`) before returning. The\nrefreshed rows are persisted to\
        \ the `steam_profiles` table and returned in the\nresponse with `last_updated`\
        \ set to the current time. Refresh requests are\nrate limited and capped at\
        \ 100 account ids per call to stay inside the\nshared Steam Web API key budget.\n\
        \nSee: https://developer.valvesoftware.com/wiki/Steam_Web_API#GetPlayerSummaries_(v0002)\n\
        \n### Rate Limits:\n| Type | Limit |\n| ---- | ----- |\n| IP | 100req/s (read\
        \ path), 3req/min + 15req/h (refresh) |\n| Key | - (read path), 10req/min\
        \ + 60req/h (refresh) |\n| Global | - (read path), 30req/min + 200req/h (refresh)\
        \ |\n    "
      operationId: steam
      parameters:
      - description: "Comma separated list of account ids, Account IDs are in `SteamID3`\
          \ format."
        explode: true
        in: query
        name: account_ids
        required: true
        schema:
          items:
            format: int64
            minimum: 0
            type: integer
          maxItems: 1000
          minItems: 1
          type: array
          default: null
        style: form
      - description: Refresh the listed profiles from the Steam Web API before returning.
        explode: true
        in: query
        name: refresh
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SteamProfile"
                type: array
                default: null
          description: Steam Profiles
        "400":
          description: Provided parameters are invalid.
        "404":
          description: No Steam profile found.
        "429":
          description: Rate limit exceeded (only enforced when refresh=true).
        "500":
          description: Failed to fetch steam profiles.
        "502":
          description: Steam Web API call failed (only when refresh=true).
      summary: Batch Steam Profile
      tags:
      - Steam
  /v1/players/steam-search:
    get:
      description: "\nThis endpoint lets you search for Steam profiles by account_id\
        \ or personaname.\n\nSee: https://developer.valvesoftware.com/wiki/Steam_Web_API#GetPlayerSummaries_(v0002)\n\
        \n### Rate Limits:\n| Type | Limit |\n| ---- | ----- |\n| IP | 100req/s |\n\
        | Key | - |\n| Global | - |\n    "
      operationId: steam_search
      parameters:
      - description: Search query for Steam profiles.
        explode: true
        in: query
        name: search_query
        required: true
        schema:
          type: string
        style: form
      - description: Maximum number of profiles to return.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          format: int32
          maximum: 1000
          minimum: 1
          nullable: true
          type: integer
        style: form
      - description: |-
          Only return profiles that have played at least this many matches in the
          last 30 days. Defaults to 5 to filter out inactive/empty profiles and
          keep search responsive.
        explode: true
        in: query
        name: min_matches_played_last_30d
        required: false
        schema:
          default: 5
          format: int32
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: |-
          Only return profiles whose `last_team_avg_badge` is at least this
          value. Defaults to 0 (no filter). Profiles with no recorded badge are
          stored as 0 and are excluded when this is set above 0.
        explode: true
        in: query
        name: min_last_team_avg_badge
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: |-
          Weight applied to `log1p(matches_played_last_30d)` when reranking
          candidates. The final score per profile is
          `jaro_winkler(personaname_lc, query) + weight * log1p(matches_played)`.
          Set to 0 to rank purely by string similarity; raise it to bias toward
          active/popular players.
        explode: true
        in: query
        name: matches_played_weight
        required: false
        schema:
          default: "0.02"
          format: double
          minimum: 0
          nullable: true
          type: number
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SteamProfile"
                type: array
                default: null
          description: Steam Profile Search
        "400":
          description: Provided parameters are invalid.
        "404":
          description: No Steam profiles found.
        "500":
          description: Failed to fetch steam profiles.
      summary: Steam Profile Search
      tags:
      - Steam

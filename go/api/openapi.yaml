  /v1/builds:
    get:
      description: "\nSearch for builds based on various criteria.\n\n### Rate Limits:\n\
        | Type | Limit |\n| ---- | ----- |\n| IP | 100req/s |\n| Key | - |\n| Global\
        \ | - |\n    "
      operationId: search_builds
      parameters:
      - description: Filter builds based on their `last_updated` time (Unix timestamp).
        explode: true
        in: query
        name: min_unix_timestamp
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - description: Filter builds based on their `last_updated` time (Unix timestamp).
        explode: true
        in: query
        name: max_unix_timestamp
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - description: Filter builds based on their published time (Unix timestamp).
        explode: true
        in: query
        name: min_published_unix_timestamp
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - description: Filter builds based on their published time (Unix timestamp).
        explode: true
        in: query
        name: max_published_unix_timestamp
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - description: The field to sort the builds by.
        explode: true
        in: query
        name: sort_by
        required: false
        schema:
          enum:
          - weekly_favorites
          - favorites
          - ignores
          - reports
          - updated_at
          - published_at
          - version
          type: string
        style: form
      - description: The index of the first build to return.
        explode: true
        in: query
        name: start
        required: false
        schema:
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: The maximum number of builds to return.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: The direction to sort the builds in.
        explode: true
        in: query
        name: sort_direction
        required: false
        schema:
          enum:
          - desc
          - asc
          type: string
        style: form
      - description: Search for builds with a name containing this string.
        explode: true
        in: query
        name: search_name
        required: false
        schema:
          type: string
        style: form
      - description: Search for builds with a description containing this string.
        explode: true
        in: query
        name: search_description
        required: false
        schema:
          type: string
        style: form
      - description: Only return the latest version of each build.
        explode: true
        in: query
        name: only_latest
        required: false
        schema:
          type: boolean
        style: form
      - deprecated: true
        description: Filter builds by language.
        explode: true
        in: query
        name: language
        required: false
        schema:
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: Filter builds by language.
        explode: true
        in: query
        name: build_language
        required: false
        schema:
          enum:
          - English
          - German
          - French
          - Italian
          - Korean
          - SpanishSpain
          - ChineseSimplified
          - Russian
          - Thai
          - Japanese
          - PortuguesePortugal
          - Polish
          - Czech
          - Turkish
          - PortugueseBrazil
          - Ukrainian
          - SpanishLatinAmerica
          - Vietnamese
          type: string
        style: form
      - description: Filter builds by ID.
        explode: true
        in: query
        name: build_id
        required: false
        schema:
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: Filter builds by version.
        explode: true
        in: query
        name: version
        required: false
        schema:
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: "Filter builds by hero ID. See more: <https://api.deadlock-api.com/v1/assets/heroes>"
        explode: true
        in: query
        name: hero_id
        required: false
        schema:
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: Filter builds by tag.
        explode: true
        in: query
        name: tag
        required: false
        schema:
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: Filter builds by rollup category.
        explode: true
        in: query
        name: rollup_category
        required: false
        schema:
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: The author's `SteamID3`
        explode: true
        in: query
        name: author_id
        required: false
        schema:
          format: int32
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Build"
                type: array
                default: null
          description: ""
        "400":
          description: Provided parameters are invalid.
        "429":
          description: Rate limit exceeded
        "500":
          description: Internal server error
      summary: Search
      tags:
      - Builds

          type: string
        server_app_id:
          format: int32
          minimum: 0
          type: integer
        server_version:
          format: int32
          minimum: 0
          type: integer
        source_revision:
          format: int64
          minimum: 0
          type: integer
        tools_app_id:
          format: int32
          minimum: 0
          type: integer
        version_date:
          type: string
        version_datetime:
          description: |-
            `version_date` + `version_time` combined into a naive ISO-8601 string
            (`YYYY-MM-DDTHH:MM:SS`, no timezone) — matches the Python output.
          type: string
        version_time:
          type: string
      required:

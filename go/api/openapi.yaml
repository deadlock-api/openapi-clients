        style: form
      - description: "Image size. Defaults to `large`. Supported: `large`, `small`."
        explode: true
        in: query
        name: size
        required: false
        schema:
          enum:
          - large
          - small
          type: string
        style: form
      responses:
        "200":
          content:
            image/png:
              schema:
                items:
                  format: int32
                  minimum: 0
                  type: integer
                type: array
                default: null
            image/webp:
              schema:
                items:
                  format: int32
                  minimum: 0
                  type: integer
                type: array
                default: null
          description: Predicted rank badge image
        "400":
          description: Invalid account ID
        "403":
          description: User is protected or endpoint unavailable
        "404":
          description: No image available for the predicted rank
        "422":
          description: Not enough recent ranked matches (need 30)
        "429":
          description: Rate limit exceeded
        "500":
          description: Prediction failed
        "503":
          description: Rank prediction model not loaded
      summary: Rank Predict Image
      tags:
      - Players
  /v1/servers:
    get:
      description: Returns all currently active game servers.
      operationId: list
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServersResponse"
          description: ""
      summary: List Game Servers
      tags:
      - Servers
  /v1/servers/metrics:
    post:
      description: "\nIngests a single metric event reported by a game server. The\
        \ schema is intentionally\nflexible: `metric_value` carries the primary numeric\
        \ measurement and `metadata` holds\narbitrary key/value context that varies\
        \ per game mode or metric. Optional `map` and\n`game_mode_version` let callers\
        \ segment leaderboards per map or per ruleset revision.\nRequires a valid\
        \ game server secret as a Bearer token.\n    "
      operationId: ingest
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetricIngestRequest"
        required: true
      responses:
        "202":
          description: Metric accepted for ingestion.
        "400":
          description: Invalid request body.
        "401":
          description: Invalid or missing game server secret.
      summary: Game Server Metric Ingest
      tags:
      - Servers
  /v1/servers/status:
    post:
      description: "\nReports the current status of a game server.\nGame servers must\
        \ call this endpoint at least once every 30 seconds to remain active.\nRequires\
        \ a valid game server secret as a Bearer token.\n    "
      operationId: status
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerStatusRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatusResponse"
          description: ""
        "400":
          description: Invalid request body.
        "401":
          description: Invalid or missing game server secret.
      summary: Game Server Status
      tags:
      - Servers
  /v1/servers/steam:
    get:
      description: "\nReturns the list of Deadlock game servers registered with the\
        \ Steam master server\n(`IGameServersService/GetServerList`), filtered to\
        \ Deadlock's appid.\n    "
      operationId: steam_list
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SteamServer"
                type: array
                default: null
          description: ""
        "500":
          description: Fetching the Steam server list failed.
      summary: List Steam Game Servers
      tags:
      - Servers
  /v1/sql:
    get:
      description: "\nExecutes a SQL query on the database.\n\n### Rate Limits:\n\
        | Type | Limit |\n| ---- | ----- |\n| IP | 2req/min, 20req/hr |\n| Key | 10req/min\
        \ |\n| Global | 30req/min |\n    "
      operationId: sql
      parameters:
      - description: The SQL query to execute. It must follow the Clickhouse SQL syntax.
        explode: true
        in: query
        name: query
        required: true
        schema:
          type: string
        style: form
      - description: "The response format. Valid values: `json` (a JSON array), `ndjson`\
          \ (newline-delimited JSON objects)."
        explode: true
        in: query
        name: format
        required: false
        schema:
          enum:
          - json
          - ndjson
          type: string
        style: form
      responses:
        "200":
          content:
            text/plain:
              schema:
                type: string
          description: ""
        "500":
          content:
            text/plain:
              schema:
                type: string
          description: ""
      summary: Query
      tags:
      - SQL
  /v1/sql/tables:
    get:
      description: "\nLists all tables in the database.\n\n### Rate Limits:\n| Type\
        \ | Limit |\n| ---- | ----- |\n| IP | 10req/min |\n| Key | - |\n| Global |\
        \ 60req/min |\n    "
      operationId: list_tables
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
                default: null
          description: ""
        "500":
          content:
            text/plain:
              schema:
                type: string
          description: ""
      summary: List Tables
      tags:
      - SQL
  /v1/sql/tables/{table}/schema:
    get:
      description: "\nReturns the schema of a table.\n\n### Rate Limits:\n| Type |\
        \ Limit |\n| ---- | ----- |\n| IP | 10req/min |\n| Key | - |\n| Global | 60req/min\
        \ |\n    "
      operationId: table_schema
      parameters:
      - description: The name of the table to fetch the schema for.
        explode: false
        in: path
        name: table
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
          description: ""
        "500":
          content:
            text/plain:
              schema:
                type: string
          description: ""
      summary: Table Schema
      tags:
      - SQL
  /v2/patches:
    get:
      description: "\nReturns a unified feed combining patch notes from the official\
        \ Forum changelog and the Steam news feed.\n\nEach entry is tagged with a\
        \ `source` field (`forum` or `steam`).\n\n- Forum RSS: https://forums.playdeadlock.com/forums/changelog.10/index.rss\n\
        - Steam News RSS: https://store.steampowered.com/feeds/news/app/1422450/\n\
        \n### Rate Limits:\n| Type | Limit |\n| ---- | ----- |\n| IP | 100req/s |\n\
        | Key | - |\n| Global | - |\n    "
      operationId: feed
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/FeedItem"
                type: array
                default: null
          description: ""
        "500":
          description: Fetching or parsing one of the RSS feeds failed
      summary: Notes
      tags:
      - Patches

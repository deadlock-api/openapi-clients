  /v1/analytics/item-flow-stats:
    get:
      description: "\nRetrieves item build-flow statistics: per-phase item win/pick\
        \ rates and the transitions between them.\n\nItems are grouped into columns\
        \ by the in-match phase they were bought in (controlled by\n`phase_interval_s`\
        \ and `phase_count`). The response contains `nodes` (items aggregated within\
        \ a phase)\nand `edges` (transitions between an item and items in the next\
        \ phase). A locked build path can be\nsupplied via `locked_item_ids` / `locked_columns`\
        \ to restrict the population to players who bought\nthose items in the given\
        \ stage columns.\n\nEach node also carries `adjusted_win_rate`: the item's\
        \ win rate standardized to the stage's\nnet-worth-at-buy distribution. Because\
        \ players who are already ahead have more souls and buy items\nsooner, raw\
        \ win rate is heavily confounded by wealth; the adjusted figure re-weights\
        \ each item's win\nrate across net-worth buckets to the stage-wide distribution,\
        \ isolating the item's contribution from\nthe buyer's lead. It is still observational,\
        \ not a controlled/causal estimate. `reached_per_column`\ngives the distinct\
        \ baseline games that bought any upgrade in each column, so consumers can\
        \ show how\nsurvivorship-selected (e.g. long-game-only) a late stage is.\n\
        \nResults are cached for **1 hour** based on the unique combination of query\
        \ parameters provided.\n\n### Rate Limits:\n> The rate limits below are **shared\
        \ across all analytics endpoints**.\n\n| Type | Limit |\n| ---- | ----- |\n\
        | IP | 200req/min |\n| Key | 400req/min |\n| Global | 2000req/min |\n    "
      operationId: item_flow_stats
      parameters:
      - description: |-
          Deprecated/unused. `normal` mode uses fixed phase boundaries (0-9m, 9-20m, 20-30m, 30m+)
          aligned to the stats time-series; `street_brawl` columns are rounds.

  /v1/analytics/hero-ban-stats:
    get:
      description: "\nRetrieves ban statistics for each hero based on historical match\
        \ data from demo analysis.\n\nOnly matches with successfully extracted ban\
        \ data are included. Matches where ban extraction failed (empty `banned_hero_ids`)\
        \ are excluded entirely.\n\nResults are cached for **1 hour** based on the\
        \ combination of query parameters provided.\n\n### Rate Limits:\n> The rate\
        \ limits below are **shared across all analytics endpoints**.\n\n| Type |\
        \ Limit |\n| ---- | ----- |\n| IP | 200req/min |\n| Key | 400req/min |\n|\
        \ Global | 2000req/min |\n    "
      operationId: hero_ban_stats
      parameters:
      - description: Bucket allows you to group the stats by a specific field.
        explode: true
        in: query
        name: bucket
        required: false
        schema:
          enum:
          - no_bucket
          - avg_badge
          - start_time_hour
          - start_time_day
          - start_time_week
          - start_time_month
          type: string
        style: form

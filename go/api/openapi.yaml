          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their ID.
        explode: true
        in: query
        name: max_match_id
        required: false
        schema:
          format: int64
          minimum: 0
          nullable: true
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/BadgeDistribution"
                type: array
                default: null
          description: Badge Distribution
        "400":
          description: Provided parameters are invalid.
        "500":
          description: Failed to fetch badge distribution
      summary: Badge Distribution
      tags:
      - Analytics
  /v1/analytics/build-item-stats:
    get:
      description: "\nRetrieves item statistics from hero builds.\n\nResults are cached\
        \ for **1 hour** based on the unique combination of query parameters provided.\
        \ Subsequent identical requests within this timeframe will receive the cached\
        \ response.\n\n### Rate Limits:\n> The rate limits below are **shared across\
        \ all analytics endpoints**.\n\n| Type | Limit |\n| ---- | ----- |\n| IP |\
        \ 200req/min |\n| Key | 400req/min |\n| Global | 2000req/min |\n    "
      operationId: build_item_stats
      parameters:
      - description: "Filter builds based on the hero ID. See more: <https://api.deadlock-api.com/v1/assets/heroes>"
        explode: true
        in: query
        name: hero_id
        required: false
        schema:
          format: int32
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter builds based on their last updated time (Unix timestamp).
          **Default:** 30 days ago.
        explode: true
        in: query
        name: min_last_updated_unix_timestamp
        required: false
        schema:
          default: 1781222400
          format: int64
          nullable: true
          type: integer
        style: form
      - description: Filter builds based on their last updated time (Unix timestamp).
        explode: true
        in: query
        name: max_last_updated_unix_timestamp
        required: false
        schema:
          format: int64
          nullable: true
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/BuildItemStats"
                type: array
                default: null
          description: Build Item Stats
        "400":
          description: Provided parameters are invalid.
        "500":
          description: Failed to fetch build item stats
      summary: Build Item Stats
      tags:
      - Analytics

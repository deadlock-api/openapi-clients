info:
  contact:
    name: Deadlock API - Discord
    url: https://discord.gg/XMF9Xrgfqu
  description: "\n## API Clients\n\nWe have auto generated and updated clients for\
    \ many languages. You can find them here: [https://github.com/deadlock-api/openapi-clients](https://github.com/deadlock-api/openapi-clients)\n\
    \n## Support the Deadlock API\n\nWhether you're building your own database, developing\
    \ data science projects, or enhancing your website with game and player analytics,\
    \ the Deadlock API has the data you need.\n\nYour sponsorship helps keep this\
    \ resource open, free and future-proof for everyone. By supporting the Deadlock\
    \ API, you will enable continued development, new features and reliable access\
    \ for developers, analysts and streamers worldwide.\n\nHelp us continue to provide\
    \ the data you need - sponsor the Deadlock API today!\n\n**-> You can Sponsor\
    \ the Deadlock API on [Patreon](https://www.patreon.com/c/user?u=68961896) or\
    \ [GitHub](https://github.com/sponsors/raimannma)**\n\n## Disclaimer\n_deadlock-api.com\
    \ is not endorsed by Valve and does not reflect the views or opinions of Valve\
    \ or anyone officially involved in producing or managing Valve properties. Valve\
    \ and all associated properties are trademarks or registered trademarks of Valve\
    \ Corporation_\n        "
  license:
    name: MIT
    url: https://github.com/deadlock-api/deadlock-api/blob/master/LICENSE
  title: Deadlock API
  version: 0.1.0
externalDocs:
  description: Source Code
  url: https://github.com/deadlock-api/deadlock-api
servers:
- url: https://api.deadlock-api.com
tags:
- description: Endpoints that return data about game patches.
  name: Patches
- description: |2

    Comprehensive match data endpoints for retrieving detailed information about games.
    Provides access to active matches, match metadata, replay salts, and more.
  name: Matches
- description: Custom Match related endpoints
  name: Custom Matches
- description: |2

    Query and inspect match demo files: discover the queryable schema and run SQL extractions
    over a demo's entity and event tables.
  name: Demo
- description: Player related endpoints
  name: Players
- description: "\n# STOP! READ THIS FIRST!\n\nPlease be very careful when using this\
    \ endpoint and make yourself familiar with the way we calculate the MMR.\n\nThis\
    \ is how we calculate a player MMR.\n\n1. We take the average badge of the team\
    \ the player was on in a match.\n2. We convert the badge to a MMR score using\
    \ the formula: `(intDiv(badge, 10) - 1) * 6 + (badge % 10)`\n3. We do a exponential\
    \ moving average (EMA) of the last 50 matches to get the player's MMR score.\n\
    4. We convert the MMR score back to a badge using the formula: `10 * intDiv(mmr_score,\
    \ 6) + 1 + mmr_score % 6`\n\n### Rate Limits:\n| Type | Limit |\n| ---- | -----\
    \ |\n| IP | 5req/min |\n| Key | 25req/min |\n| Global | 50req/min |\n\nRate limits\
    \ are shared across all MMR endpoints (single bucket).\n    "
  name: MMR
- description: Steam related endpoints
  name: Steam
- description: |2

    Endpoints for retrieving global and hero-specific leaderboards.
    Supports filtering by region and provides data in both JSON and protobuf formats.
  name: Leaderboard
- description: |2

    Comprehensive game statistics and analysis endpoints.
    Provides detailed performance metrics for heroes, items, and players, including hero synergies, counters, and combinations.
    Features scoreboards for both heroes and players.
  name: Analytics
- description: |2

    Search and retrieve hero builds with comprehensive filtering options.
  name: Builds
- description: |2

    Integration endpoints for the [Deadlock Streamkit](https://streamkit.deadlock-api.com/).
    Provides functionality to resolve dynamic command templates and variables for streaming overlays and chat commands.
    Includes endpoints to retrieve available variables, resolve specific variables or command templates, and get widget version information.
  name: Commands
- description: |2

    System status and info endpoints.
    Provides health checks for monitoring service availability (Clickhouse, Postgres, Redis) and API statistics including database table sizes, match fetching rates, and missed matches.
  name: Info
- description: |2

    Database exploration endpoints for direct SQL access.
    Provides functionality to execute custom SQL queries with rate limiting protection, list available tables, and inspect table schemas.
  name: SQL
- description: |2

    Game server status and listing endpoints.
    Used by game servers to report their status and by clients to discover available servers.
  name: Servers
- description: Accolade definitions derived from per-version game data files.
  name: Accolades
- description: Build tag definitions derived from per-version localization keys.
  name: Build Tags
- description: Known Deadlock client/game versions with versioned assets available.
  name: Client Versions
- description: Panorama color palette from per-version `citadel_base_styles.css`.
  name: Colors
- description: Game-wide generic configuration derived from per-version `generic_data.vdata`.
  name: Generic Data
- description: Hero metadata derived from per-version game data files.
  name: Heroes
- description: "Item, ability, and weapon definitions parsed from the patch's KV3\
    \ source files. Mirrors the previous Python `/v2/items` endpoint."
  name: Items
- description: Loot table definitions derived from per-version game data files.
  name: Loot Tables
- description: "Map metadata: minimap radius, image-layer URLs, objective marker positions\
    \ (from per-version `objectives_map.css`), and the zip-line lane splines."
  name: Map
- description: "Misc entity definitions (powerup spawners, breakable props, neutral\
    \ camps, capture points, …) derived from per-version game data files."
  name: Misc Entities
- description: NPC unit definitions derived from per-version game data files.
  name: NPC Units
- description: "File-tree indexes of static assets (images, icons, sounds, fonts)\
    \ hosted on the CDN, mapping each asset's name to its public URL."
  name: Assets
- description: "Per-rank metadata (name, tier color, badge image URLs) derived from\
    \ per-version game data files."
  name: Ranks
- description: "Per-version `steam.inf` manifest (client/server version, app IDs,\
    \ build timestamp)."
  name: Steam Info
- description: |2

    GraphQL API for flexible match and player queries.

    Visit [/v1/graphql](/v1/graphql) in a browser for the interactive GraphiQL playground.
  name: GraphQL
paths:
  /v1/analytics/ability-order-stats:
    get:
      description: "\nRetrieves statistics for the ability order of a hero.\n\n###\
        \ Rate Limits:\n> The rate limits below are **shared across all analytics\
        \ endpoints**.\n\n| Type | Limit |\n| ---- | ----- |\n| IP | 200req/min |\n\
        | Key | 400req/min |\n| Global | 2000req/min |\n    "
      operationId: ability_order_stats
      parameters:
      - description: "See more: <https://api.deadlock-api.com/v1/assets/heroes>"
        explode: true
        in: query
        name: hero_id
        required: true
        schema:
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: "Filter matches based on their game mode. Valid values: `normal`,\
          \ `street_brawl`. **Default:** `normal`."
        explode: true
        in: query
        name: game_mode
        required: false
        schema:
          enum:
          - normal
          - street_brawl
          - explore_n_y_c
          - internal
          nullable: true
          type: string
        style: form
      - description: Filter matches based on their start time (Unix timestamp). **Default:**
          30 days ago.
        explode: true
        in: query
        name: min_unix_timestamp
        required: false
        schema:
          default: 1781222400
          format: int64
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their start time (Unix timestamp).
        explode: true
        in: query
        name: max_unix_timestamp
        required: false
        schema:
          format: int64
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their duration in seconds (up to 7000s).
        explode: true
        in: query
        name: min_duration_s
        required: false
        schema:
          format: int64
          maximum: 7000
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their duration in seconds (up to 7000s).
        explode: true
        in: query
        name: max_duration_s
        required: false
        schema:
          format: int64
          maximum: 7000
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter players based on their minimum number of ability upgrades
          over the whole match.
        explode: true
        in: query
        name: min_ability_upgrades
        required: false
        schema:
          format: int64
          maximum: 16
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter players based on their maximum number of ability upgrades
          over the whole match.
        explode: true
        in: query
        name: max_ability_upgrades
        required: false
        schema:
          format: int64
          maximum: 16
          minimum: 1
          nullable: true
          type: integer
        style: form
      - description: Filter players based on their final net worth.
        explode: true
        in: query
        name: min_networth
        required: false
        schema:
          format: int64
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter players based on their final net worth.
        explode: true
        in: query
        name: max_networth
        required: false
        schema:
          format: int64
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: "Filter matches based on the average badge level (tier = first\
          \ digits, subtier = last digit) of *both* teams involved. See more: <https://api.deadlock-api.com/v1/assets/ranks>"
        explode: true
        in: query
        name: min_average_badge
        required: false
        schema:
          format: int32
          maximum: 116
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: "Filter matches based on the average badge level (tier = first\
          \ digits, subtier = last digit) of *both* teams involved. See more: <https://api.deadlock-api.com/v1/assets/ranks>"
        explode: true
        in: query
        name: max_average_badge
        required: false
        schema:
          format: int32
          maximum: 116
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their ID.
        explode: true
        in: query
        name: min_match_id
        required: false
        schema:
          format: int64
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their ID.
        explode: true
        in: query
        name: max_match_id
        required: false
        schema:
          format: int64
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: The minimum number of matches played for an ability order to
          be included in the response.
        explode: true
        in: query
        name: min_matches
        required: false
        schema:
          default: 20
          format: int32
          minimum: 1
          nullable: true
          type: integer
        style: form
      - deprecated: true
        description: Filter for matches with a specific player account ID.
        explode: true
        in: query
        name: account_id
        required: false
        schema:
          format: int32
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Comma separated list of account ids to include
        explode: true
        in: query
        name: account_ids
        required: false
        schema:
          items:
            format: int32
            minimum: 0
            type: integer
          maxItems: 1000
          minItems: 1
          nullable: true
          type: array
          default: null
        style: form
      - description: "Comma separated list of item ids to include (only players who\
          \ have purchased these items). See more: <https://api.deadlock-api.com/v1/assets/items>"
        explode: true
        in: query
        name: include_item_ids
        required: false
        schema:
          items:
            format: int32
            minimum: 0
            type: integer
          nullable: true
          type: array
          default: null
        style: form
      - description: "Comma separated list of item ids to exclude (only players who\
          \ have not purchased these items). See more: <https://api.deadlock-api.com/v1/assets/items>"
        explode: true
        in: query
        name: exclude_item_ids
        required: false
        schema:
          items:
            format: int32
            minimum: 0
            type: integer
          nullable: true
          type: array
          default: null
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/AnalyticsAbilityOrderStats"
                type: array
                default: null
          description: Ability Order Stats
        "400":
          description: Provided parameters are invalid.
        "500":
          description: Failed to fetch ability order stats
      summary: Ability Order Stats
      tags:
      - Analytics

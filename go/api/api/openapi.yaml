  /v1/matches/metadata:
    get:
      description: "\nThis endpoints lets you fetch multiple match metadata at once.\
        \ The response is a JSON array of match metadata.\n\nWhen player info is included,\
        \ each player object contains a `hero_build_id` field (if available) from\
        \ demo analysis.\n\n> **Note:** The `hero_build_id` represents the first build\
        \ the player had selected when the game started. It does not reflect any build\
        \ changes made during the match.\n\n### Rate Limits:\n| Type | Limit |\n|\
        \ ---- | ----- |\n| IP | 10req/min |\n| Key | 10req/10s |\n| Global | 100req/min\
        \ |\n    "
      operationId: bulk_metadata
      parameters:
      - description: Include match info in the response.
        explode: true
        in: query
        name: include_info
        required: false
        schema:
          default: true
          type: boolean
        style: form
      - description: Include more match info in the response.
        explode: true
        in: query
        name: include_more_info
        required: false
        schema:
          type: boolean
        style: form
      - description: Include objectives in the response.
        explode: true
        in: query
        name: include_objectives
        required: false
        schema:
          type: boolean
        style: form
      - description: Include midboss in the response.
        explode: true
        in: query
        name: include_mid_boss
        required: false
        schema:
          type: boolean
        style: form
      - description: Include player info in the response.
        explode: true
        in: query
        name: include_player_info
        required: false
        schema:
          type: boolean
        style: form
      - description: "Include only K/D/A fields (`kills`, `deaths`, `assists`) for\
          \ players."
        explode: true
        in: query
        name: include_player_kda
        required: false
        schema:
          type: boolean
        style: form
      - description: Include player items in the response.
        explode: true
        in: query
        name: include_player_items
        required: false
        schema:
          type: boolean
        style: form
      - description: Include player stats in the response.
        explode: true
        in: query
        name: include_player_stats
        required: false
        schema:
          type: boolean
        style: form
      - description: Include player death details in the response.
        explode: true
        in: query
        name: include_player_death_details
        required: false
        schema:
          type: boolean
        style: form
      - description: "Filter matches based on their game mode. Valid values: `normal`,\
          \ `street_brawl`. Omit or pass empty string for no filter."
        explode: true
        in: query
        name: game_mode
        required: false
        schema:
          enum:
          - normal
          - street_brawl
          - explore_n_y_c
          - internal
          nullable: true
          type: string
        style: form
      - description: "Filter matches based on the match mode. Valid values: `unranked`,\
          \ `private_lobby`, `coop_bot`, `ranked`, `server_test`, `tutorial`, `hero_labs`.\
          \ **Default:** `ranked,unranked`."
        explode: true
        in: query
        name: match_mode
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: "Comma separated list of match ids, limited by `limit`"
        explode: true
        in: query
        name: match_ids
        required: false
        schema:
          items:
            format: int64
            minimum: 0
            type: integer
          maxItems: 1000
          minItems: 1
          nullable: true
          type: array
        style: form
      - description: Filter matches based on their start time (Unix timestamp).
        explode: true
        in: query
        name: min_unix_timestamp
        required: false
        schema:
          format: int64
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their start time (Unix timestamp).
        explode: true
        in: query
        name: max_unix_timestamp
        required: false
        schema:
          format: int64
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their duration in seconds (up to 7000s).
        explode: true
        in: query
        name: min_duration_s
        required: false
        schema:
          format: int64
          maximum: 7000
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their duration in seconds (up to 7000s).
        explode: true
        in: query
        name: max_duration_s
        required: false
        schema:
          format: int64
          maximum: 7000
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: "Filter matches based on the average badge level (tier = first\
          \ digits, subtier = last digit) of *both* teams involved. See more: <https://assets.deadlock-api.com/v2/ranks>"
        explode: true
        in: query
        name: min_average_badge
        required: false
        schema:
          format: int32
          maximum: 116
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: "Filter matches based on the average badge level (tier = first\
          \ digits, subtier = last digit) of *both* teams involved. See more: <https://assets.deadlock-api.com/v2/ranks>"
        explode: true
        in: query
        name: max_average_badge
        required: false
        schema:
          format: int32
          maximum: 116
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their ID.
        explode: true
        in: query
        name: min_match_id
        required: false
        schema:
          format: int64
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on their ID.
        explode: true
        in: query
        name: max_match_id
        required: false
        schema:
          format: int64
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: Filter matches based on whether they are in the high skill range.
        explode: true
        in: query
        name: is_high_skill_range_parties
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - description: Filter matches based on whether they are in the low priority
          pool.
        explode: true
        in: query
        name: is_low_pri_pool
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - description: Filter matches based on whether they are in the new player pool.
        explode: true
        in: query
        name: is_new_player_pool
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - description: Filter matches by account IDs of players that participated in
          the match.
        explode: true
        in: query
        name: account_ids
        required: false
        schema:
          items:
            format: int32
            minimum: 0
            type: integer
          nullable: true
          type: array
        style: form
      - description: "Filter matches based on the hero IDs. See more: <https://assets.deadlock-api.com/v2/heroes>"
        explode: true
        in: query
        name: hero_ids
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Hero ID to scope item filters to. Required when using `include_item_ids`
          or `exclude_item_ids`.
        explode: true
        in: query
        name: item_filter_hero_id
        required: false
        schema:
          format: int32
          minimum: 0
          nullable: true
          type: integer
        style: form
      - description: |-
          Comma separated list of item ids to include.
          Requires `item_filter_hero_id`. Returns matches where a player on the specified hero has ALL of these items.
        explode: true
        in: query
        name: include_item_ids
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: |-
          Comma separated list of item ids to exclude.
          Requires `item_filter_hero_id`. Returns matches where a player on the specified hero has NONE of these items.
        explode: true
        in: query
        name: exclude_item_ids
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: |-
          Comma separated list of extra match-level columns to include in the response.
          Each column is aggregated with `any(...)`. Only alphanumeric characters, underscores, and
          dots (for nested field access) are allowed.
          Example: `objectives_mask_team0,team_score`.
        explode: true
        in: query
        name: extra_match_columns
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: |-
          Comma separated list of extra player-level columns to include in the response.
          Each column is added inside the player tuple. Only alphanumeric characters, underscores,
          and dots (for nested field access) are allowed.
          Example: `stats.player_damage,stats.player_healing`. Implicitly enables player fields.
        explode: true
        in: query
        name: extra_player_columns
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: The field to order the results by.
        explode: true
        in: query
        name: order_by
        required: false
        schema:
          enum:
          - match_id
          - start_time
          - average_badge
          type: string
        style: form
      - description: The direction to order the results by.
        explode: true
        in: query
        name: order_direction
        required: false
        schema:
          enum:
          - desc
          - asc
          type: string
        style: form
      - description: The maximum number of matches to return.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 1000
          format: int32
          maximum: 10000
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                items:
                  format: int32
                  minimum: 0
                  type: integer
                type: array
          description: ""
        "400":
          description: Provided parameters are invalid.
        "429":
          description: Rate limit exceeded
      summary: Bulk Metadata
      tags:
      - Matches
  /v1/matches/recently-fetched:
    get:
      description: "\nThis endpoint returns a list of match ids that have been fetched\

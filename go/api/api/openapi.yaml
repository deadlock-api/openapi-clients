        "429":
          description: Rate limit exceeded
        "500":
          description: Spectating match failed
      summary: Live Broadcast URL
      tags:
      - Matches
  /v1/matches/{match_id}/metadata:
    get:
      description: "\nThis endpoint returns the match metadata for the given `match_id`\
        \ parsed into JSON.\n\nEach player object is enriched with a `hero_build_id`\
        \ field (if available) from demo analysis.\n\n> **Note:** The `hero_build_id`\
        \ represents the first build the player had selected when the game started.\
        \ It does not reflect any build changes made during the match.\n\nProtobuf\
        \ definitions can be found here: [https://github.com/SteamDatabase/Protobufs](https://github.com/SteamDatabase/Protobufs)\n\
        \nRelevant Protobuf Messages:\n- CMsgMatchMetaData\n- CMsgMatchMetaDataContents\n\
        \n### Rate Limits:\n| Type | Limit |\n| ---- | ----- |\n| IP | From Cache:\
        \ 100req/s<br>From S3: 100req/10s<br>From Steam: 3req/h |\n| Key | From Cache:\
        \ 100req/s<br>From S3: 100req/s<br>From Steam: 300req/h |\n| Global | From\
        \ Cache: 100req/s<br>From S3: 700req/s<br>From Steam: 1500req/h |\n    "
      operationId: metadata
      parameters:
      - description: The match ID
        explode: false
        in: path
        name: match_id
        required: true
        schema:
          format: int64
          minimum: 0
          type: integer
        style: simple
      - explode: true
        in: query
        name: is_custom
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - description: |-
          If `true`, skip the Steam fallback when the metadata is not available in S3
          and return an error instead.
        explode: true
        in: query
        name: disable_steam
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      responses:
        "200":
          description: "Match metadata, see protobuf type: CMsgMatchMetaDataContents"
        "400":
          description: Provided parameters are invalid.
        "404":
          description: Match metadata not found
        "429":
          description: Rate limit exceeded
        "500":
          description: Fetching or parsing match metadata failed
      summary: Metadata
      tags:
      - Matches
  /v1/matches/{match_id}/metadata/raw:
    get:
      description: "\nThis endpoints returns the raw .meta.bz2 file for the given\
        \ `match_id`.\n\nYou have to decompress it and decode the protobuf message.\n\
        \nProtobuf definitions can be found here: [https://github.com/SteamDatabase/Protobufs](https://github.com/SteamDatabase/Protobufs)\n\
        \nRelevant Protobuf Messages:\n- CMsgMatchMetaData\n- CMsgMatchMetaDataContents\n\
        \n### Rate Limits:\n| Type | Limit |\n| ---- | ----- |\n| IP | From Cache:\
        \ 100req/s<br>From S3: 100req/10s<br>From Steam: 3req/h |\n| Key | From Cache:\
        \ 100req/s<br>From S3: 100req/s<br>From Steam: 300req/h |\n| Global | From\
        \ Cache: 100req/s<br>From S3: 700req/s<br>From Steam: 1500req/h |\n    "
      operationId: metadata_raw
      parameters:
      - description: The match ID
        explode: false
        in: path
        name: match_id
        required: true
        schema:
          format: int64
          minimum: 0
          type: integer
        style: simple
      - explode: true
        in: query
        name: is_custom
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - description: |-
          If `true`, skip the Steam fallback when the metadata is not available in S3
          and return an error instead.
        explode: true
        in: query
        name: disable_steam
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                items:
                  format: int32
                  minimum: 0
                  type: integer
                type: array
          description: ""
        "400":
          description: Provided parameters are invalid.
        "404":
          description: Match metadata not found
        "429":
          description: Rate limit exceeded
        "500":
          description: Fetching match metadata failed
      summary: Metadata as Protobuf
      tags:
      - Matches
  /v1/matches/{match_id}/salts:
    get:
      description: "\nThis endpoints returns salts that can be used to fetch metadata\

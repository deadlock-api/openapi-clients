  /v1/players/{account_id}/match-history:
    get:
      description: "\nThis endpoint returns the player match history for the given\
        \ `account_id`.\n\nIf the account is friends with one of our bots, the match\
        \ history is a combination of the data from **Steam** and **ClickHouse**,\
        \ so you always get the most up-to-date data and full history.\nIf the account\
        \ is not friends with a bot, only the stored match history from **ClickHouse**\
        \ is returned.\n\nProtobuf definitions can be found here: [https://github.com/SteamDatabase/Protobufs](https://github.com/SteamDatabase/Protobufs)\n\
        \nRelevant Protobuf Messages:\n- CMsgClientToGcGetMatchHistory\n- CMsgClientToGcGetMatchHistoryResponse\n\
        \n### Rate Limits (only applies to bot friends):\n| Type | Limit |\n| ----\
        \ | ----- |\n| IP | 100req/s<br>Bot-Friend: 3req/h<br>With `force_refetch=true`:\
        \ 1req/h |\n| Key | -<br>Bot-Friend: 300req/h<br>With `force_refetch=true`:\
        \ 5req/h |\n| Global | -<br>Bot-Friend: 1500req/h<br>With `force_refetch=true`:\
        \ 10req/h |\n    "
      operationId: match_history
      parameters:
      - description: The players `SteamID3`
        explode: false
        in: path
        name: account_id
        required: true
        schema:
          format: int32
          minimum: 0
          type: integer
        style: simple
      - description: |-
          Refetch the match history from Steam, even if it is already cached in `ClickHouse`.
          Only use this if you are sure that the data in `ClickHouse` is outdated.
          Enabling this flag results in a strict rate limit.
        explode: true
        in: query
        name: force_refetch
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/PlayerMatchHistoryEntry"
                type: array
          description: ""
        "400":
          description: Provided parameters are invalid.
        "429":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/PlayerMatchHistoryEntry"
                type: array
          description: "Rate limit exceeded. Returns stored match history from ClickHouse\
            \ as a fallback. When `force_refetch=true`, returns an error instead."
        "500":
          description: Fetching player match history failed
      summary: Match History
      tags:
      - Players

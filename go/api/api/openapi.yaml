  /v1/players/{account_id}/rank-predict:
    get:
      description: |2

        Predicts a player's current rank badge from their last 30 ranked/unranked matches.
        Requires at least 30 eligible matches (Ranked or Unranked, Normal game mode) with valid badge data.

        > **This is an ML prediction and may be inaccurate.** The model has no access to the player's
        > actual hidden MMR — it infers rank from match context signals only.

        ### Model Accuracy (5-fold cross-validation)

        | Metric | Value |
        |--------|-------|
        | R²     | 0.912 |
        | MAE    | 1.32 sub-ranks |
        | RMSE   | 2.24 sub-ranks |
        | Within ±1 sub-rank | 71.7% |
        | Within ±3 sub-rank | 92.0% |
        | Within ±5 sub-rank | 96.8% |
        | Within ±6 sub-rank | 97.8% |
        | Within ±10 sub-rank | 99.3% |

        Accuracy by tier:

        | Tier range | n | MAE |
        |------------|---|-----|
        | Low (1-4)  | 755 | 5.55 sub-ranks |
        | Mid (5-7)  | 2030 | 3.56 sub-ranks |
        | High (8-11)| 70620 | 1.21 sub-ranks |

        ### Rate Limits:
        | Type | Limit |
        | ---- | ----- |
        | IP | 100req/s |
        | Key | - |
        | Global | - |
      operationId: rank_predict
      parameters:
      - description: The players `SteamID3`
        explode: false
        in: path
        name: account_id
        required: true
        schema:
          format: int32
          minimum: 0
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RankPredictResponse"
          description: ""
        "400":
          description: Invalid account ID
        "403":
          description: User is protected or endpoint unavailable
        "422":
          description: Not enough recent ranked matches (need 30)
        "429":
          description: Rate limit exceeded
        "500":
          description: Prediction failed
        "503":
          description: Rank prediction model not loaded
      summary: Rank Predict
      tags:
      - Players
  /v1/servers:
    get:
      description: Returns all currently active game servers.
      operationId: list
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServersResponse"
          description: ""
      summary: List Game Servers
      tags:
      - Servers
  /v1/servers/metrics:
    post:
      description: "\nIngests a single metric event reported by a game server. The\
        \ schema is intentionally\nflexible: `metric_value` carries the primary numeric\
        \ measurement and `metadata` holds\narbitrary key/value context that varies\
        \ per game mode or metric. Optional `map` and\n`game_mode_version` let callers\
        \ segment leaderboards per map or per ruleset revision.\nRequires a valid\
        \ game server secret as a Bearer token.\n    "
      operationId: ingest
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetricIngestRequest"
        required: true
      responses:
        "202":
          description: Metric accepted for ingestion.
        "400":
          description: Invalid request body.
        "401":
          description: Invalid or missing game server secret.
      summary: Game Server Metric Ingest
      tags:
      - Servers
  /v1/servers/status:
    post:
      description: "\nReports the current status of a game server.\nGame servers must\
        \ call this endpoint at least once every 30 seconds to remain active.\nRequires\
        \ a valid game server secret as a Bearer token.\n    "
      operationId: status
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerStatusRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatusResponse"
          description: ""
        "400":
          description: Invalid request body.
        "401":
          description: Invalid or missing game server secret.
      summary: Game Server Status
      tags:
      - Servers
  /v1/servers/steam:
    get:
      description: "\nReturns the list of Deadlock game servers registered with the\
        \ Steam master server\n(`IGameServersService/GetServerList`), filtered to\
        \ Deadlock's appid.\n    "
      operationId: steam_list
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SteamServer"
                type: array
          description: ""
        "500":
          description: Fetching the Steam server list failed.
      summary: List Steam Game Servers
      tags:
      - Servers
  /v1/sql:
    get:
      description: "\nExecutes a SQL query on the database.\n\n### Rate Limits:\n\
        | Type | Limit |\n| ---- | ----- |\n| IP | 2req/min, 20req/hr |\n| Key | 10req/min\
        \ |\n| Global | 30req/min |\n    "
      operationId: sql

  /v1/analytics/hero-build-stats/{hero_id}:
    get:
      description: "\nRetrieves performance statistics for hero builds based on historical\
        \ match data from demo analysis.\n\nOnly includes builds that exist in the\
        \ hero builds database.\n\nThe `hero_build_id` is the first build the player\
        \ had selected when the game started. It does not reflect any build changes\
        \ made during the match.\n\nResults are cached for **1 hour** based on the\
        \ combination of query parameters provided.\n\n### Rate Limits:\n> The rate\
        \ limits below are **shared across all analytics endpoints**.\n\n| Type |\
        \ Limit |\n| ---- | ----- |\n| IP | 200req/min |\n| Key | 400req/min |\n|\
        \ Global | 2000req/min |\n    "
      operationId: hero_build_stats
      parameters:
      - description: "The hero ID to fetch build stats for. See more: <https://assets.deadlock-api.com/v2/heroes>"
        explode: false
        in: path
        name: hero_id
        required: true
        schema:
          format: int32
          minimum: 0
          type: integer
        style: simple
      - description: "Filter matches based on their start time (Unix timestamp). **Default:**\
          \ 30 days ago. **Minimum:** March 1, 2026."
        explode: true
        in: query
        name: min_unix_timestamp
        required: false
        schema:
          default: 1775001600
          format: int64
          nullable: true
          type: integer
